<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radiohead Lyrics Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-container">
        <!-- Layer 1 -->
        <div class="bg-layer layer-1 active">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
            <div class="blob blob-4"></div>
            <div class="blob blob-5"></div>
        </div>
        <!-- Layer 2 -->
        <div class="bg-layer layer-2">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
            <div class="blob blob-3"></div>
            <div class="blob blob-4"></div>
            <div class="blob blob-5"></div>
        </div>
        <div class="background-overlay"></div>
    </div>

    <div class="player-container">
        <div class="player is-landing">
            <!-- Album Cover -->
            <div class="album-cover-container">
                <img id="albumCover" src="assets/Radiohead.png" alt="Radiohead" class="album-cover">
            </div>

            <!-- Song Info -->
            <div class="song-info-container">
                <p id="songName" class="song-name">Generate a Lyric...</p>
                <p id="albumName" class="album-name">RADIOHEAD</p>
            </div>

            <!-- Lyrics Display -->
            <div class="lyrics-display">
                <p id="lyricsText" class="lyrics-text">Press generate to make your life more depressing</p>
            </div>

            <!-- Progress Bar  -->
            <div class="progress-bar">
                <div id="lyricsProgress" class="progress-fill"></div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button id="generateBtn" class="control-btn generate-btn">
                    <span class="btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path></svg>
                    </span>
                    <span class="btn-text">GENERATE</span>
                </button>
                <button id="resetBtn" class="control-btn reset-btn">
                    <span class="btn-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect></svg>
                    </span>
                    <span class="btn-text">RESET</span>
                </button>
            </div>

        </div>
    </div>

    <script src="lyrics.js"></script>
    <script src="script.js"></script>
</body>
</html>
